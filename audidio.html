<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audio</title>

<style>
body {
    background: black;
    color: #ff3b3b;
    font-family: "Courier New", monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    cursor: pointer;
}

#start {
    font-size: 24px;
    letter-spacing: 3px;
}
</style>
</head>

<body>

<div id="start">[ click to tree ]</div>

<audio id="bgm" loop>
    <source src="trees.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("bgm");

document.body.addEventListener("click", () => {

    audio.volume = 0;
    audio.play().catch(e => console.log("Audio blocked:", e));

    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 0.3) {
            vol += 0.01;
            audio.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 100);

    document.getElementById("start").textContent = "[ tree ]";

}, { once: true });
</script>

</body>
</html>
